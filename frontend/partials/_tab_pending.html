<div class="tab-pane fade" id="tab-pending">
<div class="container py-3">

<!-- 新建待办表单 -->
<div class="card bg-light mb-4">
  <div class="card-header py-2 px-3 d-flex align-items-center gap-2">
    <i class="bi bi-plus-circle"></i><span class="fw-semibold">新建待办</span>
  </div>
  <div class="card-body py-3">
    <form id="pendingForm">
      <div class="row g-2">
        <div class="col-md-4">
          <label class="form-label fw500 mb-1">标题</label>
          <input type="text" class="form-control" name="title" placeholder="如：维修-急">
        </div>
        <div class="col-md-4">
          <label class="form-label fw500 mb-1">客户 <span class="text-danger">*</span></label>
          <div class="customer-select-wrap">
            <input type="text" class="form-control" id="pendingCustomerName" name="customer_name" required autocomplete="off" placeholder="输入客户名" oninput="showCustomerDropdown(event.target)" onfocus="showCustomerDropdown(event.target)">
            <div class="customer-dropdown" id="pendingCustomerDropdown"></div>
          </div>
          <input type="hidden" name="contact_name" id="pendingContactName">
          <input type="hidden" name="contact_phone" id="pendingContactPhone">
          <input type="hidden" name="work_address" id="pendingWorkAddress">
        </div>
        <div class="col-md-2">
          <label class="form-label fw500 mb-1">经办人</label>
          <input type="text" class="form-control" name="staff_name" placeholder="经办人">
        </div>
        <div class="col-md-2">
          <label class="form-label fw500 mb-1">到期日期</label>
          <input type="date" class="form-control" name="reminder_date">
        </div>
      </div>
      <div class="row g-2 mt-1">
        <div class="col-md-3">
          <label class="form-label fw500 mb-1">待办类型</label>
          <select class="form-select" name="todo_type">
            <option value="客户报修">客户报修</option>
            <option value="内部跟进">内部跟进</option>
            <option value="施工准备">施工准备</option>
            <option value="回访">回访</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label fw500 mb-1">优先级</label>
          <select class="form-select" name="priority">
            <option value="normal">普通</option>
            <option value="urgent">紧急</option>
            <option value="low">低</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label fw500 mb-1">状态</label>
          <select class="form-select" name="status">
            <option value="pending">待处理</option>
            <option value="processing">处理中</option>
            <option value="completed">已完成</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label fw500 mb-1">待办内容 <span class="text-danger">*</span></label>
          <textarea class="form-control" name="work_content" rows="2" required placeholder="填写待办描述"></textarea>
        </div>
      </div>
      <div class="row mt-2">
        <div class="col-12">
          <button type="submit" class="btn btn-warning w-100 py-2 fw-semibold"><i class="bi bi-plus-lg me-1"></i> 添加待办</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- 待办列表标题 + 筛选 -->
<div class="d-flex align-items-center justify-content-between mb-2">
  <div class="d-flex align-items-center gap-2">
    <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>报修待办</h5>
    <span class="badge bg-danger rounded-pill" id="pendingCountBadge">0</span>
  </div>
  <div class="d-flex gap-1" role="group" id="pendingFilterGroup">
    <button type="button" class="btn btn-outline-secondary active" data-filter="all" onclick="setPendingFilter('all')">全部</button>
    <button type="button" class="btn btn-outline-secondary" data-filter="urgent" onclick="setPendingFilter('urgent')">紧急</button>
    <button type="button" class="btn btn-outline-secondary" data-filter="overdue" onclick="setPendingFilter('overdue')">超期</button>
    <button type="button" class="btn btn-outline-secondary" data-filter="today" onclick="setPendingFilter('today')">今日</button>
  </div>
</div>

<!-- 待办列表 -->
<div id="pendingList">
  <div class="text-muted small py-2">加载中...</div>
</div>

</div>
</div>
