<!-- ====== 数据备份弹窗 ====== -->
<div class="modal fade" id="backupModal" tabindex="-1">
<div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5 class="modal-title"><i class="bi bi-cloud-arrow-down me-1"></i>数据备份与恢复</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<div class="d-flex gap-2 mb-3"><button class="btn btn-primary" onclick="createBackup()"><i class="bi bi-plus-circle me-1"></i>创建备份</button><button class="btn btn-outline-secondary" onclick="loadBackups()"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button></div>
<div id="backupStatus" class="small text-success mb-2 is-0"></div>
<div id="backupListContainer" class="small"></div>
</div></div></div></div>

<!-- ====== 照片查看器 ====== -->
<div id="photoViewerModal" class="is-19" style="display:none !important">
<!-- 顶部关闭 -->
<div class="is-20">
<button class="btn btn-dark border-0 rounded-circle p-2 is-21" onclick="pvClose()"><i class="bi bi-x-lg text-white"></i></button>
</div>
<!-- 序号 -->
<div id="pvIndex" class="is-22"></div>
<!-- 左右箭头（固定在屏幕中间） -->
<button class="btn btn-dark border-0 position-absolute start-0 top-50 translate-middle-y ms-3 is-5" onclick="pvPrev()" id="pvPrevBtn"><i class="bi bi-chevron-left fs-3 text-white"></i></button>
<button class="btn btn-dark border-0 position-absolute end-0 top-50 translate-middle-y me-3 is-5" onclick="pvNext()" id="pvNextBtn"><i class="bi bi-chevron-right fs-3 text-white"></i></button>
<!-- 图片容器 -->
<div id="pvContainer" class="is-23">
<img id="pvImage" src="" alt="" class="is-24">
</div>
<!-- 底部控件（屏幕中间靠下） -->
<div class="is-25">
<button class="btn btn-sm text-white border-0 is-6" onclick="pvZoomOut()" title="缩小"><i class="bi bi-zoom-out"></i></button>
<button class="btn btn-sm text-white border-0 is-26" onclick="pvReset()" title="复位"><i class="bi bi-arrow-counterclockwise"></i></button>
<button class="btn btn-sm text-white border-0 is-6" onclick="pvZoomIn()" title="放大"><i class="bi bi-zoom-in"></i></button>
<span class="text-white-50 is-27">|</span>
<button class="btn btn-sm text-white border-0 is-7" onclick="pvPrev()" title="上一张" id="pvCtrlPrev"><i class="bi bi-skip-backward"></i></button>
<span class="text-white-50 small" id="pvCtrlIndex">1/1</span>
<button class="btn btn-sm text-white border-0 is-7" onclick="pvNext()" title="下一张" id="pvCtrlNext"><i class="bi bi-skip-forward"></i></button>
</div>
</div>

<!-- ====== 快速添加客户 ====== -->
<div class="modal fade" id="quickCustomerModal" tabindex="-1">
<div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5 class="modal-title"><i class="bi bi-person-plus me-1"></i>添加客户</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<form id="quickCustomerForm">
<div class="mb-3"><label class="form-label fw500">客户简称 <span class="text-danger">*</span></label><input type="text" class="form-control" id="qcName" required></div>
<div class="mb-3"><label class="form-label fw500">客户全称</label><input type="text" class="form-control" id="qcFullName"></div>
<div class="mb-3"><label class="form-label fw500">统一社会信用代码</label><input type="text" class="form-control" id="qcCreditCode"></div>
<div class="mb-3"><label class="form-label fw500">联系人</label><input type="text" class="form-control" id="qcContactName"></div>
<div class="mb-3"><label class="form-label fw500">电话</label><input type="text" class="form-control" id="qcPhone"></div>
<div class="mb-3"><label class="form-label fw500">地址</label><input type="text" class="form-control" id="qcAddress"></div>
<button type="submit" class="btn btn-primary w-100">添加并应用到表单</button>
</form></div></div></div></div>

<!-- ====== 员工编辑弹窗 ====== -->
<div class="modal fade" id="staffEditModal" tabindex="-1">
<div class="modal-dialog"><div class="modal-content">
<div class="modal-header"><h5 class="modal-title"><i class="bi bi-pencil me-1"></i>编辑员工</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<form id="staffEditForm">
<input type="hidden" id="seId">
<div class="row g-2">
<div class="col-md-6"><label class="form-label fw500">姓名</label><input type="text" class="form-control" id="seName" required></div>
<div class="col-md-6"><label class="form-label fw500">电话</label><input type="text" class="form-control" id="sePhone"></div>
<div class="col-md-6"><label class="form-label fw500">类型</label>
<select class="form-select" id="seType" onchange="onSeTypeChange()">
<option value="fixed">固定工</option>
<option value="temp">临时工</option>
</select>
</div>
<div class="col-md-6"><label class="form-label fw500">月薪 (¥)</label><input type="number" class="form-control" id="seMonthly" step="1" min="0" placeholder="月薪" oninput="editCalcDaily()"></div>
<div class="col-md-6"><label class="form-label fw500">日薪 (¥)</label><input type="number" class="form-control" id="seWage" step="1" min="0" placeholder="日薪" oninput="editCalcMonthly()"></div>
<div class="col-md-6"><label class="form-label fw500">工种/职位</label><input type="text" class="form-control" id="sePosition"></div>
<div class="col-md-6"><label class="form-label fw500">所属项目</label><input type="text" class="form-control" id="seProject"></div>
<div class="col-md-6"><label class="form-label fw500">身份证号</label><input type="text" class="form-control" id="seIdCard"></div>
<div class="col-md-6"><label class="form-label fw500">入职日期</label><input type="date" class="form-control" id="seHireDate"></div>
<div class="col-12"><label class="form-label fw500">备注</label><input type="text" class="form-control" id="seRemark"></div>
<div class="col-12" id="seAccountSection">
<div class="card bg-light p-2">
<strong class="small"><i class="bi bi-shield me-1"></i>登录账号设置</strong>
<div class="row g-2 mt-1">
<div class="col-md-4"><label class="form-label small mb-0">用户名</label><input type="text" class="form-control form-control-sm" id="seAccUsername" placeholder="登录用户名"></div>
<div class="col-md-4"><label class="form-label small mb-0">密码</label><input type="password" class="form-control form-control-sm" id="seAccPassword" placeholder="留空不修改"></div>
<div class="col-md-4"><label class="form-label small mb-0">状态</label><select class="form-select form-select-sm" id="seAccEnabled"><option value="1">启用</option><option value="0">禁用</option></select></div>
<div class="col-12 mt-1">
<label class="form-label small mb-1">权限</label>
<div class="d-flex align-items-center gap-2">
<label class="btn btn-outline-secondary text-start d-flex align-items-center gap-2 is-28" id="seAdminToggle">
<input type="checkbox" id="seAdminCheck" onchange="onSeRoleChange()" class="is-29">
<strong>管理员</strong>
</label>
<small class="text-muted" id="seRoleHint">员工：基础功能（工作记录、客户、待办、统计）</small>
<small class="text-muted is-0" id="seAdminHint">管理员：员工管理、账户管理、删除</small>
</div>
<input type="hidden" id="seAccRole" value="worker">
</div>
</div>
</div></div>
<div class="col-12 is-0" id="seIdPhotoSection">
<label class="form-label fw500">身份证照片</label>
<div class="d-flex align-items-center gap-2">
<img id="seIdPhotoPreview" src="" class="is-2">
<button type="button" class="btn btn-outline-primary btn-sm" onclick="document.getElementById('seIdPhotoInput').click()"><i class="bi bi-upload"></i> 上传</button>
<input type="file" id="seIdPhotoInput" accept="image/*" onchange="uploadEditStaffPhoto('id_photo')" class="is-0">
</div>
<div class="d-flex align-items-center gap-2 mt-1">
<label class="form-label fw500 mb-0 me-2">证书照片</label>
<img id="seCertPhotoPreview" src="" class="is-2">
<button type="button" class="btn btn-outline-primary btn-sm" onclick="document.getElementById('seCertPhotoInput').click()"><i class="bi bi-upload"></i> 上传</button>
<input type="file" id="seCertPhotoInput" accept="image/*" onchange="uploadEditStaffPhoto('cert_photo')" class="is-0">
</div>
</div>
</div>
<button type="submit" class="btn btn-primary w-100 mt-2"><i class="bi bi-check-lg me-1"></i>保存修改</button>
</form>
</div></div></div></div>

<!-- ====== 修改密码弹窗 ====== -->
<div class="modal fade" id="changePasswordModal" tabindex="-1">
<div class="modal-dialog modal-sm"><div class="modal-content">
<div class="modal-header"><h5 class="modal-title"><i class="bi bi-key me-1"></i>修改密码</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<form id="changePasswordForm">
<div class="mb-3"><label class="form-label fw500">旧密码</label><input type="password" class="form-control" id="cpOld" required></div>
<div class="mb-3"><label class="form-label fw500">新密码</label><input type="password" class="form-control" id="cpNew" required minlength="4"></div>
<div class="text-danger small mb-2 is-0" id="cpError"></div>
<button type="submit" class="btn btn-primary w-100">保存</button>
</form>
</div></div></div></div>
