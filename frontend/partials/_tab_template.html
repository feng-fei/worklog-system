<div class="tab-pane fade" id="tab-template">
<div class="container py-3">

<div class="card card-accent-blue shadow-sm mb-3">
<div class="card-header d-flex align-items-center gap-2"><i class="bi bi-building"></i><span class="fw-semibold">公司信息</span><small class="text-muted ms-2">（用于维修单生成）</small></div>
<div class="card-body">
<form id="companyForm" onsubmit="return saveCompanySettings(event)">
<div class="row g-3">
<div class="col-md-4"><label class="form-label">公司名称</label><input class="form-control" name="company_name" placeholder="如：珠海市瑞翼智能科技有限公司"></div>
<div class="col-md-4"><label class="form-label">公司地址</label><input class="form-control" name="company_address" placeholder="公司地址"></div>
<div class="col-md-4"><label class="form-label">联系电话</label><input class="form-control" name="company_phone" placeholder="联系电话"></div>
<div class="col-md-4"><label class="form-label">联系人</label><input class="form-control" name="company_contact" placeholder="联系人"></div>
<div class="col-md-4"><label class="form-label">开户银行</label><input class="form-control" name="company_bank_name" placeholder="开户银行名称"></div>
<div class="col-md-4"><label class="form-label">银行账号</label><input class="form-control" name="company_bank_account" placeholder="银行账号"></div>
</div>
<div class="mt-3"><button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>保存公司信息</button><span id="companyMsg" class="small ms-2 is-0"></span></div>
</form>
</div></div>

<div class="card card-accent-green shadow-sm mb-3">
<div class="card-header d-flex align-items-center gap-2"><i class="bi bi-file-earmark-spreadsheet"></i><span class="fw-semibold">维修单模板</span><small class="text-muted ms-2">（上传 Excel 模板，生成维修单时使用）</small></div>
<div class="card-body">
<div id="templateInfo" class="mb-3"><div class="text-muted">加载中...</div></div>
<div class="d-flex gap-2 flex-wrap">
<button class="btn btn-outline-primary" onclick="downloadTemplate()"><i class="bi bi-download me-1"></i>下载当前模板</button>
<label class="btn btn-success tm-upload-btn"><i class="bi bi-upload me-1"></i>上传新模板<input type="file" accept=".xlsx,.xls,.xlsm" onchange="uploadTemplate(this)" hidden></label>
</div>
<div id="templateMsg" class="small mt-2 is-0"></div>
</div></div>

</div></div>

</main><!-- .tab-content -->
